[env:T5-ePaper-S3]
platform = espressif32@^6.9.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

monitor_filters = esp32_exception_decoder

board_build.arduino.memory_type = qio_opi
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216

check_tool = clangtidy
check_src_filters = +<src/*> +<include/*> -<include/icons/*>
check_flags =
    clangtidy: --config-file=.clang-tidy

lib_deps =
    https://github.com/Xinyuan-LilyGO/LilyGo-EPD47.git

build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; LilyGo-EPD47 driver selects the T5 4.7" V2.3 pinmap when this is set.
    -DLILYGO_T5_47=1
    ; Keep the chip awake and re-cycle from loop() instead of deep-sleeping.
    ; USB-CDC stays enumerated this way, so /dev/cu.usbmodem* survives across
    ; refresh cycles. Comment out for production.
    -DDEBUG_NO_SLEEP=1

# Project-code-only warnings — applied to src/ and include/, not to libs.
# -Wdouble-promotion is dropped: gcc flags every printf("%f", float) which
# is benign on ESP32 and would drown out real findings.
# -Wformat is kept at the default level (not =2): -Wformat=2 implies
# -Wformat-nonliteral which fires on constant macros like MET_PATH_FMT.
build_src_flags =
    -Wall
    -Wextra
    -Wshadow
    -Wuninitialized
    -Wmaybe-uninitialized
    -Wmissing-field-initializers
    -Wpointer-arith
    -Wcast-align
    -Wformat
    -Wnull-dereference
    -Wno-unused-parameter
